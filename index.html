<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的网站</title>
  <style>
    /* 页面基础样式 */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Arial', sans-serif;
      background: #87CEEB;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== 天空背景 ===== */
    .sky {
      position: relative;
      width: 100%;
      height: 100vh;
      background: linear-gradient(to bottom, #4fc3f7 0%, #81d4fa 40%, #b3e5fc 70%, #e1f5fe 100%);
      overflow: hidden;
    }

    /* 太阳 */
    .sun {
      position: absolute;
      top: 60px;
      right: 120px;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, #fff176, #ffeb3b, #ffd54f);
      border-radius: 50%;
      box-shadow: 0 0 40px 20px rgba(255, 235, 59, 0.5);
      animation: sunGlow 3s ease-in-out infinite alternate;
    }

    @keyframes sunGlow {
      from { box-shadow: 0 0 40px 20px rgba(255, 235, 59, 0.5); }
      to   { box-shadow: 0 0 60px 35px rgba(255, 235, 59, 0.7); }
    }

    /* 云朵 */
    .cloud {
      position: absolute;
      background: white;
      border-radius: 50px;
      opacity: 0.9;
    }
    .cloud::before, .cloud::after {
      content: '';
      position: absolute;
      background: white;
      border-radius: 50%;
    }
    .cloud1 { top: 80px; left: 80px; width: 120px; height: 40px; animation: floatCloud 18s linear infinite; }
    .cloud1::before { width: 60px; height: 60px; top: -30px; left: 20px; }
    .cloud1::after  { width: 50px; height: 50px; top: -25px; left: 55px; }

    .cloud2 { top: 140px; left: 400px; width: 90px; height: 30px; animation: floatCloud 25s linear infinite; opacity: 0.75; }
    .cloud2::before { width: 45px; height: 45px; top: -22px; left: 15px; }
    .cloud2::after  { width: 38px; height: 38px; top: -18px; left: 42px; }

    .cloud3 { top: 50px; left: 700px; width: 100px; height: 35px; animation: floatCloud 20s linear infinite 5s; }
    .cloud3::before { width: 55px; height: 55px; top: -27px; left: 18px; }
    .cloud3::after  { width: 44px; height: 44px; top: -22px; left: 48px; }

    @keyframes floatCloud {
      from { transform: translateX(0); }
      to   { transform: translateX(110vw); }
    }

    /* ===== 树林区域 ===== */
    .forest-layer {
      position: absolute;
      bottom: 120px; /* 地面上方 */
      width: 100%;
      display: flex;
      align-items: flex-end;
      justify-content: space-around;
      pointer-events: none;
    }

    /* 单棵树 */
    .tree {
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* 树冠（三角形叠加） */
    .tree-top {
      position: relative;
    }
    .tree-top .t1, .tree-top .t2, .tree-top .t3 {
      display: block;
      width: 0;
      height: 0;
      margin: 0 auto;
    }
    .tree-top .t1 {
      border-left: solid transparent;
      border-right: solid transparent;
      border-bottom: solid;
      margin-bottom: -8px;
    }
    .tree-top .t2 {
      border-left: solid transparent;
      border-right: solid transparent;
      border-bottom: solid;
      margin-bottom: -10px;
    }
    .tree-top .t3 {
      border-left: solid transparent;
      border-right: solid transparent;
      border-bottom: solid;
    }

    /* 树干 */
    .tree-trunk {
      background: #5d4037;
      border-radius: 3px;
    }

    /* 深绿色大树 */
    .tree-big .t1 { border-left-width: 28px; border-right-width: 28px; border-bottom-width: 40px; border-bottom-color: #2e7d32; }
    .tree-big .t2 { border-left-width: 36px; border-right-width: 36px; border-bottom-width: 48px; border-bottom-color: #388e3c; }
    .tree-big .t3 { border-left-width: 44px; border-right-width: 44px; border-bottom-width: 56px; border-bottom-color: #43a047; }
    .tree-big .tree-trunk { width: 18px; height: 30px; }

    /* 中绿色中树 */
    .tree-mid .t1 { border-left-width: 20px; border-right-width: 20px; border-bottom-width: 30px; border-bottom-color: #1b5e20; }
    .tree-mid .t2 { border-left-width: 26px; border-right-width: 26px; border-bottom-width: 36px; border-bottom-color: #2e7d32; }
    .tree-mid .t3 { border-left-width: 32px; border-right-width: 32px; border-bottom-width: 42px; border-bottom-color: #388e3c; }
    .tree-mid .tree-trunk { width: 13px; height: 22px; }

    /* 浅绿色小树 */
    .tree-small .t1 { border-left-width: 13px; border-right-width: 13px; border-bottom-width: 20px; border-bottom-color: #33691e; }
    .tree-small .t2 { border-left-width: 17px; border-right-width: 17px; border-bottom-width: 25px; border-bottom-color: #558b2f; }
    .tree-small .t3 { border-left-width: 21px; border-right-width: 21px; border-bottom-width: 30px; border-bottom-color: #689f38; }
    .tree-small .tree-trunk { width: 9px; height: 16px; }

    /* 后排树（更暗、更小，营造远近感） */
    .forest-back {
      bottom: 155px;
    }
    .tree-back .t1 { border-left-width: 16px; border-right-width: 16px; border-bottom-width: 24px; border-bottom-color: #1a3a1a; }
    .tree-back .t2 { border-left-width: 21px; border-right-width: 21px; border-bottom-width: 30px; border-bottom-color: #1e4620; }
    .tree-back .t3 { border-left-width: 26px; border-right-width: 26px; border-bottom-width: 36px; border-bottom-color: #245227; }
    .tree-back .tree-trunk { width: 9px; height: 18px; background: #3e2723; }

    /* ===== 地面 ===== */
    .ground {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 130px;
      background: linear-gradient(to bottom, #66bb6a 0%, #4caf50 30%, #388e3c 100%);
    }
    /* 草地纹理细节 */
    .ground::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 18px;
      background: radial-gradient(ellipse 14px 10px at 50% 100%, #81c784 45%, transparent 55%);
      background-size: 28px 18px;
    }

    /* ===== 内容区 ===== */
    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
    }

    .content h1 {
      font-size: 3rem;
      color: white;
      text-shadow: 2px 4px 8px rgba(0,0,0,0.3);
      margin-bottom: 10px;
    }

    .content p {
      font-size: 1.2rem;
      color: #e3f2fd;
      text-shadow: 1px 2px 4px rgba(0,0,0,0.2);
      margin-bottom: 30px;
    }

    /* ===== 图片画廊 ===== */
    .gallery {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      justify-content: center;
      border: 2px solid rgba(255,255,255,0.4);
    }

    .gallery img {
      width: 140px;
      height: 100px;
      object-fit: cover;
      border-radius: 12px;
      border: 3px solid white;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
    }

    .gallery img:hover {
      transform: scale(1.12) rotate(-2deg);
      box-shadow: 0 8px 25px rgba(0,0,0,0.35);
    }

    /* ===== 响应式 ===== */
    @media (max-width: 600px) {
      .content h1 { font-size: 2rem; }
      .gallery img { width: 100px; height: 70px; }
      .sun { width: 55px; height: 55px; right: 30px; top: 40px; }
    }
  </style>
</head>
<body>

  <!-- 主场景容器 -->
  <div class="sky">

    <!-- 太阳 -->
    <div class="sun"></div>

    <!-- 云朵 -->
    <div class="cloud cloud1"></div>
    <div class="cloud cloud2"></div>
    <div class="cloud cloud3"></div>

    <!-- ===== 后排树林（地平线远处，颜色更深更暗） ===== -->
    <div class="forest-layer forest-back">
      <div class="tree tree-back"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
      <div class="tree tree-back"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
      <div class="tree tree-back"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
      <div class="tree tree-back"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
      <div class="tree tree-back"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
      <div class="tree tree-back"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
      <div class="tree tree-back"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
      <div class="tree tree-back"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
      <div class="tree tree-back"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
    </div>

    <!-- ===== 前排树林（地平线近处，颜色鲜艳，大小混合） ===== -->
    <div class="forest-layer">
      <div class="tree tree-small"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
      <div class="tree tree-big"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
      <div class="tree tree-mid"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
      <div class="tree tree-big"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
      <div class="tree tree-small"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
      <div class="tree tree-mid"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
      <div class="tree tree-big"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
      <div class="tree tree-small"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
      <div class="tree tree-mid"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
      <div class="tree tree-big"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
      <div class="tree tree-small"><div class="tree-top"><span class="t1"></span><span class="t2"></span><span class="t3"></span></div><div class="tree-trunk"></div></div>
    </div>

    <!-- 地面草地 -->
    <div class="ground"></div>

    <!-- 页面文字内容 + 图片 -->
    <div class="content">
      <h1>🌲 我的美丽网站 🌲</h1>
      <p>欢迎来到我的第一个网站！</p>

      <!-- 图片画廊 -->
      <div class="gallery">
        <img src="https://raw.githubusercontent.com/MikeRuan/ai-camp-assets/main/uploads/76ca12be-8448-4026-b5a3-f782a35771b4.jpg" alt="图片1">
        <img src="https://raw.githubusercontent.com/MikeRuan/ai-camp-assets/main/uploads/18ff0233-36dc-4e57-9e41-bbdfa0e1c2bd.jpg" alt="图片2">
        <img src="https://raw.githubusercontent.com/MikeRuan/ai-camp-assets/main/uploads/73720cd1-9406-4af7-a58f-a49b97327ff1.jpg" alt="图片3">
      </div>
    </div>

  </div><!-- end .sky -->

  <script>
    // 页面加载完成后执行
    document.addEventListener('DOMContentLoaded', function() {

      // 让云朵在动画结束后重新从左边出现（循环）
      var clouds = document.querySelectorAll('.cloud');
      clouds.forEach(function(cloud) {
        // 随机化初始位置，让云朵更自然
        var randomStart = Math.random() * 80;
        cloud.style.left = randomStart + 'vw';
      });

      // 点击图片放大效果
      var imgs = document.querySelectorAll('.gallery img');
      imgs.forEach(function(img) {
        img.addEventListener('click', function() {
          // 创建一个临时全屏遮罩
          var overlay = document.createElement('div');
          overlay.style.cssText = [
            'position:fixed', 'top:0', 'left:0', 'width:100vw', 'height:100vh',
            'background:rgba(0,0,0,0.8)', 'display:flex', 'align-items:center',
            'justify-content:center', 'z-index:9999', 'cursor:pointer'
          ].join(';');

          var bigImg = document.createElement('img');
          bigImg.src = img.src;
          bigImg.style.cssText = 'max-width:90vw;max-height:90vh;border-radius:16px;border:4px solid white;';

          overlay.appendChild(bigImg);
          document.body.appendChild(overlay);

          // 点击遮罩关闭
          overlay.addEventListener('click', function() {
            document.body.removeChild(overlay);
          });
        });
      });

      // BUTTON CHECKLIST: (no standalone buttons in this page — gallery images use click handlers above ✓)
    });
  </script>

</body>
</html>
